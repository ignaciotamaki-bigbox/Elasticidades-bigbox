        <style>
            * { box-sizing: border-box; }

            .staticrypt-html, .staticrypt-body {
                height: 100%;
                margin: 0;
                padding: 0;
            }

            .staticrypt-body {
                font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                color: #ffffff;

                /* Fondo: degradé oscuro + glow sutil + grilla casi imperceptible */
                background-color: #0a0a0b;
                background-image:
                    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(120, 119, 198, 0.18), transparent 70%),
                    radial-gradient(ellipse 60% 40% at 50% 120%, rgba(228, 73, 125, 0.12), transparent 70%),
                    linear-gradient(180deg, #0a0a0b 0%, #14141a 100%);
                background-attachment: fixed;
                position: relative;
                overflow-x: hidden;
            }

            /* Grilla sutil encima del degradé */
            .staticrypt-body::before {
                content: "";
                position: fixed;
                inset: 0;
                background-image:
                    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
                background-size: 64px 64px;
                pointer-events: none;
                z-index: 0;
            }

            /* Viñeta suave en los bordes */
            .staticrypt-body::after {
                content: "";
                position: fixed;
                inset: 0;
                background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);
                pointer-events: none;
                z-index: 0;
            }

            .staticrypt-content {
                position: relative;
                z-index: 2;
                min-height: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 40px 20px;
            }

            /* Header arriba del card */
            .brand-header {
                text-align: center;
                margin-bottom: 32px;
                letter-spacing: 0.3px;
            }
            .brand-eyebrow {
                font-size: 10px;
                font-weight: 500;
                letter-spacing: 2.8px;
                text-transform: uppercase;
                color: rgba(255,255,255,0.45);
                margin-bottom: 14px;
            }
            .brand-logo {
                font-family: 'Outfit', sans-serif;
                font-size: 34px;
                font-weight: 700;
                letter-spacing: -1px;
                color: #ffffff;
                line-height: 1;
            }
            .brand-logo em {
                font-style: italic;
                font-weight: 500;
                background: linear-gradient(110deg, #a1a1aa 0%, #e4e4e7 35%, #a1a1aa 70%);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
            }
            .brand-tagline {
                margin-top: 12px;
                font-size: 12px;
                color: rgba(255,255,255,0.35);
                font-weight: 400;
                letter-spacing: 0.2px;
            }

            /* Card del formulario */
            .staticrypt-page {
                width: 100%;
                max-width: 400px;
                padding: 0;
            }

            .staticrypt-form {
                background: #ffffff;
                border-radius: 14px;
                padding: 36px 32px;
                text-align: center;
                box-shadow:
                    0 20px 60px -15px rgba(0,0,0,0.55),
                    0 0 0 1px rgba(255,255,255,0.08);
                color: #18181b;
            }

            .staticrypt-instructions {
                margin-bottom: 24px;
            }
            .staticrypt-title {
                font-family: 'Outfit', sans-serif;
                font-size: 18px;
                font-weight: 700;
                color: #18181b;
                margin: 0 0 6px;
                letter-spacing: -0.3px;
            }
            .staticrypt-instructions p:last-child {
                margin: 0;
                font-size: 13px;
                color: #6b7280;
                line-height: 1.55;
            }

            .staticrypt-hr {
                display: none; /* No necesitamos la línea del template original */
            }

            /* Input de password */
            .staticrypt-password-container {
                position: relative;
                margin: 0 0 14px;
                background: #f4f4f5;
                border: 1px solid #e4e4e7;
                border-radius: 10px;
                transition: border-color 0.15s, background 0.15s;
            }
            .staticrypt-password-container:focus-within {
                border-color: #18181b;
                background: #ffffff;
            }
            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                width: 100%;
                background: transparent;
                border: 0;
                outline: 0;
                padding: 13px 44px 13px 14px;
                font-size: 14px;
                font-family: inherit;
                color: #18181b;
                border-radius: 10px;
            }
            .staticrypt-form input::placeholder { color: #9ca3af; }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                width: 18px;
                opacity: 0.5;
                padding: 12px;
                position: absolute;
                right: 2px;
                top: 50%;
                transform: translateY(-50%);
                transition: opacity 0.15s;
            }
            .staticrypt-toggle-password-visibility:hover { opacity: 0.8; }

            /* Checkbox Remember me */
            label.staticrypt-remember {
                display: flex;
                align-items: center;
                justify-content: flex-start;
                gap: 10px;
                margin: 14px 0 18px;
                font-size: 12px;
                color: #6b7280;
                cursor: pointer;
                user-select: none;
            }
            .staticrypt-remember input[type="checkbox"] {
                width: 15px;
                height: 15px;
                accent-color: #18181b;
                cursor: pointer;
                margin: 0;
                transform: none;
            }

            /* Botón */
            .staticrypt-form .staticrypt-decrypt-button {
                width: 100%;
                background: #18181b;
                color: #ffffff;
                border: 0;
                padding: 14px;
                font-size: 13px;
                font-weight: 600;
                font-family: inherit;
                letter-spacing: 0.5px;
                text-transform: uppercase;
                cursor: pointer;
                border-radius: 10px;
                transition: background 0.15s, transform 0.05s;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover {
                background: #27272a;
            }
            .staticrypt-form .staticrypt-decrypt-button:active {
                transform: translateY(1px);
            }
            .staticrypt-form .staticrypt-decrypt-button:focus {
                outline: none;
                box-shadow: 0 0 0 3px rgba(255,255,255,0.25);
            }

            /* Footer */
            .brand-footer {
                margin-top: 28px;
                font-size: 11px;
                color: rgba(255,255,255,0.28);
                text-align: center;
                letter-spacing: 0.3px;
            }

            /* Spinner de carga */
            .hidden { display: none !important; }
            .staticrypt-spinner-container {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.22em solid rgba(255,255,255,0.15);
                border-right-color: rgba(255,255,255,0.7);
                border-radius: 50%;
                animation: spinner-border 0.8s linear infinite;
            }
            @keyframes spinner-border { 100% { transform: rotate(360deg); } }

            /* Safari iOS no ampliar al tipear */
            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }

            @media (max-width: 480px) {
                .brand-logo { font-size: 28px; }
                .staticrypt-form { padding: 28px 22px; }
            }
        </style>
    </head>
